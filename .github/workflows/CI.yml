name: CI-Padavan-V2-Final-PCIe

on: 
  push:
  workflow_dispatch:

env:
  # Используем основную ветку, так как в 4.4 нет поддержки MT7628
  src_git: https://github.com/hanwckf/rt-n56u.git
  build_dir: /opt/rt-n56u
  images_dir: /opt/images
  ENABLED_CFG: |
    CONFIG_FIRMWARE_INCLUDE_TCPDUMP
    CONFIG_FIRMWARE_INCLUDE_HTOP
    CONFIG_FIRMWARE_INCLUDE_NANO
    CONFIG_FIRMWARE_INCLUDE_TTYD
  DISABLED_CFG: |
    CONFIG_FIRMWARE_INCLUDE_SHADOWSOCKS
    CONFIG_FIRMWARE_INCLUDE_SSSERVER
    CONFIG_FIRMWARE_INCLUDE_WIREGUARD

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - build_variant: "mt7628"
            targets: "MI-4A_V2"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare environment
        run: |
          sudo apt update
          sudo apt install -y libtool-bin gperf python3-docutils autopoint gettext zip p7zip-full build-essential libssl-dev libltdl-dev
          mkdir -p $images_dir

      - name: Clone source
        run: |
          git clone --depth=1 $src_git $build_dir
          cd $build_dir
          echo "build_date=$(date +%Y%m%d)" >> $GITHUB_ENV
          echo "image_suffix=$(git rev-parse --short=7 HEAD)_$(date +%Y%m%d)" >> $GITHUB_ENV

      - name: Prepare toolchain
        run: |
          cd $build_dir/toolchain-mipsel
          sh dl_toolchain.sh

      - name: Modify configs for Mi 4A V2 (PCIe Support)
        run: |
          cd $build_dir/trunk/configs/templates
          
          # ИСПОЛЬЗУЕМ MI-R4A КАК ДОНОРА (в нем прописана логика PCIe для 5ГГц)
          cp MI-R4A.config MI-4A_V2.config
          
          # 1. Меняем тип процессора на MT7628 (архитектура v2)
          sed -i 's/CONFIG_FIRMWARE_CPU_7621=y/CONFIG_FIRMWARE_CPU_7628=y/g' MI-4A_V2.config
          
          # 2. Удаляем старый драйвер 7612 и ставим MT7613
          sed -i 's/CONFIG_FIRMWARE_WIFI5_MT7612E=y/CONFIG_FIRMWARE_WIFI5_MT7613=y/g' MI-4A_V2.config
          
          # 3. Добавляем критические параметры для чипа MT7613BEN
          sed -i '/CONFIG_FIRMWARE_WIFI5_MT7613/d' MI-4A_V2.config
          echo "CONFIG_FIRMWARE_WIFI5_MT7613=y" >> MI-4A_V2.config
          echo "CONFIG_FIRMWARE_WIFI_MT7613_CHIP_V10=y" >> MI-4A_V2.config
          echo "CONFIG_FIRMWARE_WIFI_MT7613_CHIP_V20=y" >> MI-4A_V2.config
          
          # 4. Включаем поддержку PCIe в ядре (без этого чип 5ГГц не виден в dmesg)
          echo "CONFIG_FIRMWARE_INCLUDE_PCIE_AR8035=n" >> MI-4A_V2.config
          
          # Применяем твои функции
          for n in $ENABLED_CFG; do sed -i "/${n}/c${n}=y" MI-4A_V2.config; done
          for n in $DISABLED_CFG; do sed -i "/${n}/c${n}=n" MI-4A_V2.config; done

      - name: Start build
        run: |
          cd $build_dir/trunk
          fakeroot ./build_firmware_modify MI-4A_V2
          
          # Ищем trx файл и копируем
          find images/ -name "*.trx" -exec cp -f {} $images_dir/MI-4A_V2.trx \;

      - name: Create archive
        if: ${{ success() }}
        run: |
          cd $images_dir
          zip -j MI-4A_V2_firmware_${{ env.image_suffix }}.zip MI-4A_V2.trx

      - name: Upload images to Artifact
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: Padavan_Mi4A_V2_PCIe_${{ env.image_suffix }}
          path: ${{ env.images_dir }}/*.zip
          retention-days: 7
